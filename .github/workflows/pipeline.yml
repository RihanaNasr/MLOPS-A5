name: ML Model Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow

      - name: Pull DVC Data
        run: dvc pull || echo "DVC remote is local, skipping pull error"

      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          rm -rf mlruns || true
          python train.py

      - name: Package Artifacts
        run: zip -r deployment_artifacts.zip model_info.txt mlruns/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment_artifacts
          path: deployment_artifacts.zip

  deploy:
    name: Deploy Model
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install mlflow

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment_artifacts
          path: .

      - name: Unzip Artifacts
        run: unzip -o deployment_artifacts.zip

      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"