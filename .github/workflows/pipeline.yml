name: ML Model Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc mlflow

      - name: Pull DVC Data
        run: dvc pull

      - name: Train Model
        run: |
          python train.py

      - name: Save Run ID
        run: |
          python -c "import mlflow; f=open('model_info.txt','w'); f.write(mlflow.last_active_run().info.run_id); f.close()"

      - name: Upload Run ID
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

  deploy:
    name: Deploy Model
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install Dependencies
        run: pip install mlflow

      - name: Download Run ID
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      - name: Check Accuracy Threshold
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"