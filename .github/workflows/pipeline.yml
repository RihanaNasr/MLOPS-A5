name: MLOps Multi-Job Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc mlflow scikit-learn

      # 4. Pull data using DVC
      - name: Pull data
        run: dvc pull || echo "DVC skipped"

      # 5. Run training
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py
          echo $(cat model_info.txt)

      # 6. Upload model info artifact
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model_info
          path: model_info.txt

  deploy:
    name: Deploy Model
    needs: validate
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn

      # 4. Download model info artifact
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model_info
          path: .

      # 5. Check accuracy threshold
      - name: Validate accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python check_threshold.py

      # 6. Mock Docker Build
      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"